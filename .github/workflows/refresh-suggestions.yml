name: Refresh omo suggestions

on:
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      omo_ref:
        description: "oh-my-openagent ref to check out (branch, tag, or SHA)"
        required: false
        default: "dev"
  # Or run on a schedule: weekly on Mondays
  schedule:
    - cron: "0 6 * * 1"

jobs:
  refresh:
    name: "Regenerate omo-suggestions.json"
    runs-on: ubuntu-latest
    # create-pull-request must push the branch (contents) and open the PR
    # (pull-requests); the repo's default token is read-only, so grant here.
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout oModel
        uses: actions/checkout@v7

      - name: Checkout oh-my-openagent
        uses: actions/checkout@v7
        with:
          repository: code-yeongyu/oh-my-openagent
          ref: ${{ github.event.inputs.omo_ref || 'dev' }}
          path: oh-my-openagent
          # The extractor only reads packages/model-core/src (a self-contained
          # closure, ~240 KB) plus the root package.json. Sparse-checkout (cone
          # mode also keeps root files) avoids materializing the whole repo on
          # the runner; the default depth=1 already skips history.
          sparse-checkout: |
            packages/model-core

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install omodel
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Mock `opencode` so catalog.load() degrades gracefully, exactly as CI does —
      # the validation step below must see the same environment CI would.
      - name: Create opencode mock
        run: |
          mkdir -p "$HOME/.local/bin"
          printf '#!/bin/sh\necho "mock opencode: not available"\nexit 1\n' > "$HOME/.local/bin/opencode"
          chmod +x "$HOME/.local/bin/opencode"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run snapshot extractor
        run: |
          omodel --refresh-omo --omo-src "${{ github.workspace }}/oh-my-openagent"

      - name: Check for changes
        id: diff
        run: |
          # Ignore meta-only churn: meta.generatedAt is a fresh timestamp and
          # meta.omoCommit tracks omo's dev HEAD, so the file ALWAYS differs run
          # to run even when no suggestion data changed. Compare the committed
          # file against the regenerated one with the meta block stripped, so a
          # PR opens only when real agent/category/family data actually changes.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, subprocess, sys
          path = "src/omodel/data/omo-suggestions.json"
          old = json.loads(subprocess.check_output(["git", "show", "HEAD:" + path]))
          new = json.loads(open(path).read())
          old.pop("meta", None)
          new.pop("meta", None)
          changed = old != new
          print("changed=" + ("true" if changed else "false"))
          print("data changed" if changed else "only meta changed; skipping PR", file=sys.stderr)
          PY

      # Validate the regenerated data HERE, in this job. A PR opened with GITHUB_TOKEN does
      # not trigger CI (GitHub suppresses workflow runs for token-authored events), so
      # without this the PR sits looking unchecked-but-fine while actually being untested.
      # continue-on-error so the PR still opens (the diff is worth reviewing either way) —
      # it gets a warning in its body, and the final step turns the run red.
      - name: Validate regenerated data (lint + tests)
        id: validate
        if: steps.diff.outputs.changed == 'true'
        continue-on-error: true
        run: |
          ruff check src/ tests/
          pytest tests/ -q --tb=short

      - name: Open PR if changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          # A PAT makes the opened PR trigger CI normally; falls back to the default token
          # (validation above still runs) when REFRESH_PAT is not configured. Fine-grained
          # PAT scopes: Contents read/write + Pull requests read/write on this repo.
          token: ${{ secrets.REFRESH_PAT || secrets.GITHUB_TOKEN }}
          branch: "auto/refresh-suggestions"
          title: "chore: refresh omo-suggestions.json"
          body: |
            Automated refresh of `src/omodel/data/omo-suggestions.json` from the latest
            oh-my-openagent source (${{ github.event.inputs.omo_ref || 'dev' }}).

            ${{ steps.validate.outcome == 'failure' && '⚠️ **Validation FAILED** in the refresh run below, against the data as first pushed. Do not merge until the checks are green.' || '✅ Lint + tests passed in the refresh run below, against the data as first pushed.' }}

            <sub>Point-in-time note from the run that opened this PR. Only a later refresh
            run rewrites it, so after any other push **the checks are the source of truth**,
            not this line.</sub>

            Refresh run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Review the diff before merging.
          commit-message: "chore: refresh omo-suggestions.json from omo"
          # Load-bearing: without it the action falls back to `git add -A`, which would
          # sweep in the untracked oh-my-openagent/ sparse checkout as a gitlink.
          add-paths: "src/omodel/data/omo-suggestions.json"

      # Surface a validation failure as a red run even though the PR was allowed to open.
      - name: Fail the run if validation failed
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::error::Test suite failed against the regenerated omo-suggestions.json"
          exit 1
