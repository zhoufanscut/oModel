name: Refresh omo suggestions

on:
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      omo_ref:
        description: "oh-my-openagent ref to check out (branch, tag, or SHA)"
        required: false
        default: "dev"
  # Or run on a schedule: weekly on Mondays
  schedule:
    - cron: "0 6 * * 1"

jobs:
  refresh:
    name: "Regenerate omo-suggestions.json"
    runs-on: ubuntu-latest
    # create-pull-request must push the branch (contents) and open the PR
    # (pull-requests); the repo's default token is read-only, so grant here.
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout oModel
        uses: actions/checkout@v7

      - name: Checkout oh-my-openagent
        uses: actions/checkout@v7
        with:
          repository: code-yeongyu/oh-my-openagent
          ref: ${{ github.event.inputs.omo_ref || 'dev' }}
          path: oh-my-openagent
          # The extractor only reads packages/model-core/src (a self-contained
          # closure, ~240 KB) plus the root package.json. Sparse-checkout (cone
          # mode also keeps root files) avoids materializing the whole repo on
          # the runner; the default depth=1 already skips history.
          sparse-checkout: |
            packages/model-core

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install omodel
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run snapshot extractor
        run: |
          omodel --refresh-omo --omo-src "${{ github.workspace }}/oh-my-openagent"

      - name: Check for changes
        id: diff
        run: |
          # Ignore meta-only churn: meta.generatedAt is a fresh timestamp and
          # meta.omoCommit tracks omo's dev HEAD, so the file ALWAYS differs run
          # to run even when no suggestion data changed. Compare the committed
          # file against the regenerated one with the meta block stripped, so a
          # PR opens only when real agent/category/family data actually changes.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, subprocess, sys
          path = "src/omodel/data/omo-suggestions.json"
          old = json.loads(subprocess.check_output(["git", "show", "HEAD:" + path]))
          new = json.loads(open(path).read())
          old.pop("meta", None)
          new.pop("meta", None)
          changed = old != new
          print("changed=" + ("true" if changed else "false"))
          print("data changed" if changed else "only meta changed; skipping PR", file=sys.stderr)
          PY

      - name: Open PR if changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "auto/refresh-suggestions"
          title: "chore: refresh omo-suggestions.json"
          body: |
            Automated refresh of `src/omodel/data/omo-suggestions.json` from the latest
            oh-my-openagent source (${{ github.event.inputs.omo_ref || 'dev' }}).

            Review the diff before merging.
          commit-message: "chore: refresh omo-suggestions.json from omo"
          add-paths: "src/omodel/data/omo-suggestions.json"
