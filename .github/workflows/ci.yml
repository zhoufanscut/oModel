name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Mock `opencode` so catalog.load() degrades gracefully (not on CI PATH)
      - name: Create opencode mock
        run: |
          mkdir -p "$HOME/.local/bin"
          printf '#!/bin/sh\necho "mock opencode: not available"\nexit 1\n' > "$HOME/.local/bin/opencode"
          chmod +x "$HOME/.local/bin/opencode"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Mock `bun` so refresh degrades gracefully (not on CI PATH)
      - name: Create bun mock
        run: |
          printf '#!/bin/sh\necho "mock bun: not available"\nexit 1\n' > "$HOME/.local/bin/bun"
          chmod +x "$HOME/.local/bin/bun"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
