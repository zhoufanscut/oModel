name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: "Build ${{ matrix.os-name }}-${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    # The repo's default workflow token is read-only; the release-publish step
    # (softprops/action-gh-release) needs contents:write to create the Release + upload assets.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os-name: linux
            arch: x64
            asset-name: omodel-linux-x64
          - runner: macos-latest
            os-name: darwin
            arch: arm64
            asset-name: omodel-darwin-arm64
          # Intel-mac (macos-13) dropped: GitHub is retiring those runners and they queue for
          # hours. Intel macs install via pipx (see install.sh / README).

    steps:
      - uses: actions/checkout@v7

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          INIT_VERSION="$(grep '^__version__ = ' src/omodel/__init__.py | sed -E 's/^__version__ = "([^"]+)"/\1/')"
          PYPROJECT_VERSION="$(grep '^version = ' pyproject.toml | sed -E 's/^version = "([^"]+)"/\1/')"
          echo "tag=${TAG_VERSION} __init__.py=${INIT_VERSION} pyproject.toml=${PYPROJECT_VERSION}"
          if [ "${TAG_VERSION}" != "${INIT_VERSION}" ] || [ "${TAG_VERSION}" != "${PYPROJECT_VERSION}" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match package version (__init__.py=${INIT_VERSION}, pyproject.toml=${PYPROJECT_VERSION})"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build one-file binary
        run: |
          pyinstaller \
            --onefile \
            --name omodel \
            --collect-data omodel \
            src/omodel/__main__.py

      - name: Smoke test binary
        run: |
          ./dist/omodel --version
          ./dist/omodel --check

      - name: Create tarball
        run: |
          cp LICENSE NOTICE dist/
          cd dist
          tar czf ${{ matrix.asset-name }}.tar.gz omodel LICENSE NOTICE
          rm LICENSE NOTICE
          mv omodel ${{ matrix.asset-name }}

      - name: Generate checksum
        run: |
          cd dist
          if command -v sha256sum > /dev/null 2>&1; then
            sha256sum ${{ matrix.asset-name }}.tar.gz > ${{ matrix.asset-name }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.asset-name }}.tar.gz > ${{ matrix.asset-name }}.tar.gz.sha256
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/${{ matrix.asset-name }}
            dist/${{ matrix.asset-name }}.tar.gz
            dist/${{ matrix.asset-name }}.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
